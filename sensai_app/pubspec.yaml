name: sensai_app
description: "SensAI - AI-Powered Sensory Stress Monitoring"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  # Microphone / noise level
  noise_meter: ^5.0.2
  permission_handler: ^11.3.1
  # Camera & image analysis
  camera: ^0.11.0
  google_ml_kit: ^0.19.0
  # Device sensors (light, accelerometer)
  light: ^5.0.0
  sensors_plus: ^5.0.1
  # UI helpers
  fl_chart: ^0.70.2
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
